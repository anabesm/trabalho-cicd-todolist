<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; text-align: center; }
        input[type="text"] { width: 70%; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f4f4f4; margin: 10px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>✅ Lista de Tarefas do Laboratório</h1>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Digite uma nova tarefa..." required>
        <button type="submit">Adicionar</button>
    </form>

    <ul>
        {% for todo in todos %}
            <li>{{ todo[1] }}</li>
        {% else %}
            <li>Nenhuma tarefa cadastrada.</li>
        {% endfor %}
    </ul>

</body>
</html>
